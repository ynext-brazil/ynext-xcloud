name: Release — Binários Multiplataforma

on:
  push:
    tags:
      - 'v*.*.*'  # Dispara em tags como v0.1.0, v1.0.0, etc.

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # Build de binários para cada plataforma
  # ============================================================
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ynext-xcloud
            asset_name: ynext-xcloud-linux-x86_64

          # Linux ARM64 (Raspberry Pi, etc.)
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ynext-xcloud
            asset_name: ynext-xcloud-linux-arm64

          # Windows x86_64
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ynext-xcloud.exe
            asset_name: ynext-xcloud-windows-x86_64.exe

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ynext-xcloud"

      - name: 📚 Dependências Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsecret-1-dev libdbus-1-dev
          if [[ "${{ matrix.target }}" == "aarch64-*" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: 🔨 Build Release
        run: |
          cargo build --release \
            --manifest-path ynext-xcloud/Cargo.toml \
            --target ${{ matrix.target }}

      - name: 📤 Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ynext-xcloud/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  # ============================================================
  # Criar Release no GitHub com os binários
  # ============================================================
  release:
    name: 🚀 Criar Release GitHub
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download de todos os artefatos
        uses: actions/download-artifact@v4

      - name: 🏷️ Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ynext Xcloud ${{ github.ref_name }}
          body: |
            ## 🎮 Ynext Xcloud ${{ github.ref_name }}

            Cliente nativo para Xbox Cloud Gaming.

            ### 📦 Downloads

            | Plataforma | Arquivo |
            |-----------|---------|
            | 🐧 Linux x86_64 | `ynext-xcloud-linux-x86_64` |
            | 🐧 Linux ARM64 | `ynext-xcloud-linux-arm64` |
            | 🪟 Windows x86_64 | `ynext-xcloud-windows-x86_64.exe` |

            ### Instalação (Linux)
            ```bash
            chmod +x ynext-xcloud-linux-x86_64
            ./ynext-xcloud-linux-x86_64 auth login
            ```
          files: |
            ynext-xcloud-linux-x86_64/ynext-xcloud
            ynext-xcloud-linux-arm64/ynext-xcloud
            ynext-xcloud-windows-x86_64.exe/ynext-xcloud.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
